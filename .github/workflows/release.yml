name: Deploy static content to Pages

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  # 任务 1：编译 Web 静态包 (Linux 环境)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Pull latest musiche master
        run: |
          cd musiche
          git fetch origin master
          git checkout -f FETCH_HEAD
          cd ..

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Pages
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'musiche/web/pnpm-lock.yaml'

      - name: Build Web
        run: |
          cd musiche/web
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: musiche/web/dist

  # 任务 2：编译 Windows 桌面端 (Windows 环境)
  build-windows:
    runs-on: windows-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Pull latest musiche master
        run: |
          cd musiche
          git fetch origin master
          git checkout -f FETCH_HEAD
          cd ..

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: musiche/web/dist

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Build Windows
        run: |
          powershell
          copy musiche/web/dist android/app/src/main/assets -Recurse
          cd windows
          echo "<Weavers><Costura/></Weavers>" > FodyWeavers.xml
          msbuild AudioShare.sln -t:"Restore;Build" /p:Configuration=Release /p:Platform="Any CPU"
          msbuild AudioShare.sln -t:"Restore;Build;Publish" /p:Configuration=Release /p:Platform="Any CPU" /p:PublishProfile="Properties\PublishProfiles\net6.0.pubxml" /p:TargetFramework=net6.0-windows10.0.17763.0
          cd ..
          copy windows/bin/Release/net462/AudioShare.exe AudioShare.exe
          copy windows/bin/Publish/net6.0-windows/AudioShare.exe AudioShare.net6.exe

      - name: Download Platform Tools (Adb)
        run: |
          powershell
          $prevErrorActionPreference = $ErrorActionPreference
          $ErrorActionPreference = "SilentlyContinue"
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/platform-tools-latest-windows.zip" -OutFile platform-tools.zip
          Expand-Archive -Path .\platform-tools.zip -DestinationPath .
          copy .\platform-tools\adb.exe adb.exe
          copy .\platform-tools\AdbWinApi.dll AdbWinApi.dll
          copy .\platform-tools\AdbWinUsbApi.dll AdbWinUsbApi.dll
          $ErrorActionPreference = $prevErrorActionPreference

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: |
            AudioShare.exe
            AudioShare.net6.exe
            adb.exe
            AdbWinApi.dll
            AdbWinUsbApi.dll

  # 任务 3：编译 Android 端 (Linux 环境，速度极快)
  build-android:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Pull latest musiche master
        run: |
          cd musiche
          git fetch origin master
          git checkout -f FETCH_HEAD
          cd ..

      - name: Download Web Artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: musiche/web/dist

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/master' }}

      - name: Build Android
        run: |
          mkdir -p android/app/src/main/assets
          cp -r musiche/web/dist/* android/app/src/main/assets/
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          cd ..
          cp android/app/build/outputs/apk/release/app-release.apk AudioShare.apk

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-binaries
          path: AudioShare.apk

  # 任务 4：收集编译产物并发布 Release
  publish-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-binaries
          path: .

      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: android-binaries
          path: .

      - name: Dev Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/master'
        with:
          prerelease: true
          tag_name: dev-build
          name: "AudioShare 开发版构建 (Dev Build)"
          body: |
            此版本为 Master 分支的自动编译开发版，每次提交后会自动更新。
            
            构建时间: ${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
            最近提交: ${{ github.event.head_commit.message }}
          files: |
            AudioShare.apk
            AudioShare.exe
            AudioShare.net6.exe
            adb.exe
            AdbWinApi.dll
            AdbWinUsbApi.dll

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          fail_on_unmatched_files: false
          files: |
            AudioShare.apk
            AudioShare.exe
            AudioShare.net6.exe
            adb.exe
            AdbWinApi.dll
            AdbWinUsbApi.dll
